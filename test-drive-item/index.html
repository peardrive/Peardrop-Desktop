<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DriveItem Test Harness</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e0e0e0;
      -webkit-app-region: drag;
    }
    
    .container {
      width: 100%;
      max-width: 450px;
      -webkit-app-region: no-drag;
    }
    
    h1 {
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 16px;
      opacity: 0.6;
    }
    
    #driveItemContainer {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 12px;
    }
    
    .status-log {
      margin-top: 20px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      font-size: 11px;
      font-family: 'SF Mono', Monaco, monospace;
      max-height: 150px;
      overflow-y: auto;
    }
    
    .log-entry {
      padding: 2px 0;
      opacity: 0.7;
    }
    
    .log-entry.info { color: #4a9eff; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>DriveItem Test Harness</h1>
    
    <div id="driveItemContainer">
      <!-- DriveItem will be mounted here -->
    </div>
    
    <div class="status-log" id="statusLog">
      <div class="log-entry info">Initializing...</div>
    </div>
  </div>
  
  <!-- Load DriveItem module -->
  <script src="../lib/drive-item/drive-item.js"></script>
  <!-- Load DriveActions module -->
  <script src="../lib/drive-actions.js"></script>
  <!-- Load DriveInfoPanel module -->
  <script src="../lib/drive-item/drive-info-panel.js"></script>
  
  <script>
    // ============================================================================
    // LOGGING
    // ============================================================================
    
    const statusLog = document.getElementById('statusLog');
    
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      statusLog.appendChild(entry);
      statusLog.scrollTop = statusLog.scrollHeight;
      console.log(`[Test] ${message}`);
    }
    
    // ============================================================================
    // STATE
    // ============================================================================
    
    let driveItem = null;
    let driveActions = null;
    let currentDriveId = null;
    let peerCount = 0;
    
    // ============================================================================
    // INITIALIZE
    // ============================================================================
    
    async function init() {
      log('Getting share link...');
      
      const shareLink = await window.electronAPI.getShareLink();
      log(`Link: ${shareLink.slice(0, 30)}...`);
      
      // Create DriveActions handler
      driveActions = new DriveActions(window.electronAPI);
      
      // Create initial DriveItem showing "Connecting"
      const container = document.getElementById('driveItemContainer');
      
      driveItem = new DriveItem(container, {
        data: {
          id: 'temp',
          title: 'Connecting...',
          status: 'connecting',
          progress: 0,
          peers: 0,
          type: 'download'
        },
        show: 'downloadCompact',
        theme: 'dark'
      });
      
      // Handle DriveItem menu actions via DriveActions module
      driveItem.on('action', async (event) => {
        log(`Action: ${event.action}`);
        
        // Handle more-info specially - show the info panel
        if (event.action === 'more-info') {
          const result = await driveActions.handle(event.action, event.data);
          if (result.success && result.drive) {
            // Merge current data with fetched drive info
            const fullData = { ...event.data, ...result.drive };
            showDriveInfo(fullData);
            log('Info panel opened');
          } else {
            // Show with whatever data we have
            showDriveInfo(event.data);
            log('Info panel opened (limited data)');
          }
          return;
        }
        
        const result = await driveActions.handle(event.action, event.data);
        log(`Result: ${result.success ? 'OK' : result.error}`, result.success ? 'success' : 'error');
        
        // Handle UI updates based on action result
        if (result.success) {
          if (event.action === 'remove') {
            driveItem.destroy();
            log('Drive removed');
          } else if (event.action === 'pause') {
            driveItem.update({ status: 'paused' });
          } else if (event.action === 'resume') {
            driveItem.update({ status: 'downloading' });
          }
        }
      });
      
      // Start the download flow (same as main PearDrop app)
      startDownload(shareLink);
    }
    
    async function startDownload(shareLink) {
      log('Opening drive...');
      
      try {
        // Step 1: Open/connect to remote drive
        const openResult = await window.electronAPI.hyperdriveOpen({ shareLink });
        
        if (!openResult.success) {
          log(`Open failed: ${openResult.error}`, 'error');
          driveItem.update({ status: 'error', title: 'Connection failed' });
          return;
        }
        
        currentDriveId = openResult.driveId;
        
        log(`Connected! ${openResult.shareName} (${formatBytes(openResult.totalBytes)})`);
        
        // Update DriveItem with real info
        driveItem.update({
          id: openResult.driveId,
          title: openResult.shareName,
          size: openResult.totalBytes,
          fileCount: openResult.files.length,
          files: openResult.files,
          status: 'downloading',
          progress: 0,
          peers: 1,
          shareLink: shareLink,
          type: 'download',
          createdAt: new Date().toISOString()
        });
        
        // Step 2: Start actual download
        log('Starting download...');
        const downloadResult = await window.electronAPI.hyperdriveDownload({ 
          driveId: openResult.driveId 
        });
        
        if (downloadResult.success) {
          log(`Download complete! ${downloadResult.files.length} files`, 'success');
          driveItem.update({
            status: 'complete',
            progress: 1
          });
        } else {
          log(`Download failed: ${downloadResult.error}`, 'error');
          driveItem.update({ status: 'error' });
        }
        
      } catch (err) {
        log(`Error: ${err.message}`, 'error');
        driveItem.update({ status: 'error' });
      }
    }
    
    // ============================================================================
    // IPC EVENT HANDLERS (same as main PearDrop app)
    // ============================================================================
    
    window.electronAPI.onPeerConnected((event, data) => {
      if (data.driveId === currentDriveId) {
        peerCount++;
        log(`Peer connected (${peerCount} total)`);
        driveItem.update({ peers: peerCount });
      }
    });
    
    window.electronAPI.onPeerDisconnected((event, data) => {
      if (data.driveId === currentDriveId) {
        peerCount = Math.max(0, peerCount - 1);
        log(`Peer disconnected (${peerCount} remaining)`);
        driveItem.update({ peers: peerCount });
      }
    });
    
    window.electronAPI.onUploadProgress((event, data) => {
      if (data.driveId === currentDriveId && data.peerId === 'self') {
        const progress = data.progress || (data.percent / 100);
        driveItem.update({
          status: 'downloading',
          progress: progress,
          speed: parseSpeed(data.speedFormatted)
        });
      }
    });
    
    window.electronAPI.onFilesDownloaded((event, data) => {
      if (data.driveId === currentDriveId) {
        log(`Files saved to: ${data.destDir}`, 'success');
        driveItem.update({
          status: 'complete',
          progress: 1
        });
      }
    });
    
    window.electronAPI.onConnectionStatus((event, data) => {
      log(`Status: ${data.status}`);
    });
    
    // ============================================================================
    // UTILITIES
    // ============================================================================
    
    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    
    function parseSpeed(speedStr) {
      if (!speedStr) return 0;
      const match = speedStr.match(/([\d.]+)\s*(B|KB|MB|GB)/i);
      if (!match) return 0;
      const value = parseFloat(match[1]);
      const unit = match[2].toUpperCase();
      const multipliers = { 'B': 1, 'KB': 1024, 'MB': 1024*1024, 'GB': 1024*1024*1024 };
      return value * (multipliers[unit] || 1);
    }
    
    // ============================================================================
    // START
    // ============================================================================
    
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
