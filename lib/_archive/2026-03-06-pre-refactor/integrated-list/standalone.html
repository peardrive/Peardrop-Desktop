<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IntegratedList - ScrollList + DriveItem Integration Test</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.5rem;
      font-weight: 500;
    }
    
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 20px;
    }
    
    /* Test container - simulates app window */
    .test-container {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    /* Header bar */
    .header-bar {
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .header-count {
      font-size: 0.85rem;
      opacity: 0.6;
    }
    
    /* List area */
    .list-area {
      height: 450px;
    }
    
    /* Control panel */
    .controls {
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .controls button {
      padding: 10px 16px;
      border: none;
      background: rgba(74, 158, 255, 0.2);
      color: #4a9eff;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .controls button:hover {
      background: rgba(74, 158, 255, 0.3);
    }
    
    .controls button.danger {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .controls button.danger:hover {
      background: rgba(239, 68, 68, 0.3);
    }
    
    .controls button.success {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    
    .controls button.success:hover {
      background: rgba(34, 197, 94, 0.3);
    }
    
    /* View toggle */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    
    .view-toggle button {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
    }
    
    .view-toggle button.active {
      background: rgba(74, 158, 255, 0.3);
      color: #4a9eff;
    }
    
    /* Event log */
    .event-log {
      max-width: 500px;
      margin: 20px auto 0;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .event-log-header {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .event-log-header button {
      padding: 4px 8px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    
    .event-log-content {
      height: 150px;
      overflow-y: auto;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.75rem;
      padding: 8px 12px;
    }
    
    .event-log-content::-webkit-scrollbar {
      width: 4px;
    }
    
    .event-log-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }
    
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 8px;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-time {
      color: rgba(255, 255, 255, 0.4);
      flex-shrink: 0;
    }
    
    .log-event {
      color: #4a9eff;
      flex-shrink: 0;
      min-width: 70px;
    }
    
    .log-event.action { color: #f59e0b; }
    .log-event.click { color: #22c55e; }
    .log-event.remove { color: #ef4444; }
    
    .log-data {
      color: rgba(255, 255, 255, 0.7);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>IntegratedList Test</h1>
  <p class="subtitle">ScrollList + DriveItem working together</p>
  
  <div class="test-container">
    <div class="header-bar">
      <span class="header-title">My Drives</span>
      <span class="header-count" id="driveCount">0 drives</span>
    </div>
    
    <div class="list-area" id="listContainer"></div>
    
    <div class="controls">
      <button onclick="addDownload()">+ Download</button>
      <button onclick="addUpload()" class="success">+ Upload</button>
      <button onclick="simulateProgress()">Simulate Progress</button>
      <button onclick="clearAll()" class="danger">Clear All</button>
      
      <div class="view-toggle">
        <button id="btnCompact" class="active" onclick="setView('compact')">Compact</button>
        <button id="btnExpanded" onclick="setView('expanded')">Expanded</button>
      </div>
    </div>
  </div>
  
  <div class="event-log">
    <div class="event-log-header">
      Event Log
      <button onclick="clearLog()">Clear</button>
    </div>
    <div class="event-log-content" id="eventLog"></div>
  </div>

  <!-- Load dependencies -->
  <script src="../scroll-list/scroll-list.js"></script>
  <script src="../drive-item/drive-item.js"></script>
  <script src="./integrated-list.js"></script>
  
  <script>
    // Initialize the integrated list
    const list = new IntegratedList('#listContainer', {
      emptyMessage: 'No drives yet. Add one above!',
      driveItemOptions: {
        show: 'compactIcon',  // Compact view with status icons
        theme: 'dark'
      },
      onAction: (action, data) => {
        logEvent('action', `${action} → ${data.title}`);
        
        // Handle actions
        switch (action) {
          case 'remove':
            list.removeDrive(data.id);
            break;
          case 'pause':
            list.updateDrive(data.id, { status: 'paused' });
            break;
          case 'resume':
            list.updateDrive(data.id, { status: null }); // Auto-derive
            break;
          case 'open':
            logEvent('click', `Would open: ${data.title}`);
            break;
        }
      },
      onClick: (data) => {
        logEvent('click', data.title);
      }
    });
    
    // Listen for list events
    list.on('add', (data) => {
      logEvent('add', data.title);
      updateCount();
    });
    
    list.on('remove', (data) => {
      logEvent('remove', data.title);
      updateCount();
    });
    
    list.on('update', (data) => {
      // Only log significant updates
      if (data.progress === 1) {
        logEvent('update', `${data.title} complete!`);
      }
    });
    
    list.on('transition', (event) => {
      logEvent('transition', `${event.type} → ${event.data.title}`);
    });
    
    // Sample file names
    const fileNames = [
      'bitcoin-whitepaper.pdf',
      'meeting-notes-2026.md',
      'photo-collection.zip',
      'podcast-episode-1423.mp3',
      'presentation-deck.key',
      'project-archive.tar.gz',
      'research-data.csv',
      'family-photos-2025.zip',
      'code-backup.zip',
      'music-playlist.m3u'
    ];
    
    let downloadCounter = 0;
    let uploadCounter = 0;
    
    function addDownload() {
      downloadCounter++;
      const name = fileNames[Math.floor(Math.random() * fileNames.length)];
      const size = Math.floor(Math.random() * 50000000) + 100000; // 100KB - 50MB
      
      list.addDrive({
        id: 'dl_' + Date.now(),
        title: name,
        type: 'download',
        size: size,
        fileCount: Math.floor(Math.random() * 10) + 1,
        progress: 0,
        status: 'connecting'
      });
    }
    
    function addUpload() {
      uploadCounter++;
      const name = fileNames[Math.floor(Math.random() * fileNames.length)];
      const size = Math.floor(Math.random() * 50000000) + 100000;
      
      list.addDrive({
        id: 'ul_' + Date.now(),
        title: name,
        type: 'upload',
        size: size,
        fileCount: Math.floor(Math.random() * 5) + 1,
        peers: 0,
        status: 'inactive'
      });
    }
    
    // Progress simulation
    let simInterval = null;
    
    function simulateProgress() {
      if (simInterval) {
        clearInterval(simInterval);
        simInterval = null;
        logEvent('sim', 'Simulation stopped');
        return;
      }
      
      logEvent('sim', 'Simulation started');
      
      simInterval = setInterval(() => {
        const drives = list.getDrives();
        
        drives.forEach(drive => {
          if (drive.type === 'download' && drive.progress < 1 && drive.status !== 'paused') {
            // Simulate download progress
            const speed = Math.floor(Math.random() * 2000000) + 50000; // 50KB-2MB/s
            const increment = Math.random() * 0.08 + 0.02; // 2-10% per tick
            const newProgress = Math.min(1, (drive.progress || 0) + increment);
            
            list.updateDrive(drive.id, {
              progress: newProgress,
              speed: newProgress < 1 ? speed : 0,
              peers: Math.floor(Math.random() * 3) + 1
            });
          } else if (drive.type === 'upload' && drive.status !== 'paused') {
            // Simulate upload activity (peers coming and going)
            const peers = Math.floor(Math.random() * 4);
            const speed = peers > 0 ? Math.floor(Math.random() * 1500000) + 10000 : 0;
            
            list.updateDrive(drive.id, {
              peers: peers,
              speed: speed
            });
          }
        });
      }, 500);
    }
    
    function clearAll() {
      if (simInterval) {
        clearInterval(simInterval);
        simInterval = null;
      }
      list.clear();
      logEvent('clear', 'All drives removed');
      updateCount();
    }
    
    function setView(mode) {
      document.getElementById('btnCompact').classList.toggle('active', mode === 'compact');
      document.getElementById('btnExpanded').classList.toggle('active', mode === 'expanded');
      
      if (mode === 'compact') {
        list.setVisibility('compactIcon');
      } else {
        list.setVisibility('download'); // Full download view with all stats
      }
      
      logEvent('view', mode);
    }
    
    function updateCount() {
      const count = list.getCount();
      document.getElementById('driveCount').textContent = 
        count === 1 ? '1 drive' : `${count} drives`;
    }
    
    // Event logging
    function logEvent(type, message) {
      const log = document.getElementById('eventLog');
      const time = new Date().toLocaleTimeString('en-US', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
      });
      
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-event ${type}">${type}</span>
        <span class="log-data">${message}</span>
      `;
      
      log.insertBefore(entry, log.firstChild);
      
      // Keep only last 50 entries
      while (log.children.length > 50) {
        log.removeChild(log.lastChild);
      }
    }
    
    function clearLog() {
      document.getElementById('eventLog').innerHTML = '';
    }
    
    // Add some initial test data
    setTimeout(() => {
      addDownload();
      setTimeout(() => addUpload(), 200);
      setTimeout(() => addDownload(), 400);
      logEvent('init', 'Added 3 test drives');
    }, 100);
  </script>
</body>
</html>
