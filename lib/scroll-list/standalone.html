<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ScrollList v2 - Slot-Based Architecture</title>
  <style>
    /* Reset and base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: #1a1a1a;
      color: #e0e0e0;
    }

    /* App container */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: #242424;
    }

    /* Header */
    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header .count {
      font-size: 13px;
      opacity: 0.5;
    }

    /* Menu button */
    .menu-container {
      position: relative;
    }

    .menu-button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      transition: background 0.15s;
    }

    .menu-button:hover {
      background: rgba(255,255,255,0.1);
    }

    .menu-dots {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .menu-dots span {
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
    }

    /* Menu button animations for reorder mode */
    @keyframes dot-wiggle-outer {
      0%, 100% { transform: translateX(-0.7px); }
      50% { transform: translateX(0.7px); }
    }

    @keyframes dot-wiggle-middle {
      0%, 100% { transform: translateX(0.7px); }
      50% { transform: translateX(-0.7px); }
    }

    @keyframes brightness-pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1.0; }
    }

    .menu-button.reorder-active {
      background: rgba(255, 255, 255, 0.25);
      animation: brightness-pulse 2s ease-in-out infinite;
    }

    .menu-button.reorder-active:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .menu-button.reorder-active .menu-dots span {
      background: rgba(255, 255, 255, 0.95);
    }

    .menu-button.reorder-active .menu-dots span:nth-child(1) {
      animation: dot-wiggle-outer 0.5s ease-in-out infinite;
    }
    .menu-button.reorder-active .menu-dots span:nth-child(2) {
      animation: dot-wiggle-middle 0.5s ease-in-out infinite;
    }
    .menu-button.reorder-active .menu-dots span:nth-child(3) {
      animation: dot-wiggle-outer 0.5s ease-in-out infinite;
      animation-delay: -0.08s;
    }

    /* Dropdown menu */
    .menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      min-width: 180px;
      background: #333;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px) scale(0.95);
      transform-origin: top right;
      transition: opacity 0.15s, transform 0.15s, visibility 0.15s;
      z-index: 100;
    }

    .menu-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: #e0e0e0;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .menu-item-icon {
      width: 18px;
      text-align: center;
      opacity: 0.7;
    }

    .menu-divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 4px 0;
    }

    .menu-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99;
      display: none;
    }

    .menu-backdrop.active {
      display: block;
    }

    /* List container */
    .list-container {
      flex: 1;
      min-height: 0;
    }

    /* Status bar */
    .status {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      opacity: 0.6;
    }

    /* Light mode */
    body.light-mode {
      background: #f0f0f0;
      color: #333;
    }

    body.light-mode .app {
      background: #f5f5f5;
    }

    body.light-mode .header,
    body.light-mode .status {
      border-color: rgba(0,0,0,0.08);
    }

    body.light-mode .menu-button {
      color: #333;
    }

    body.light-mode .menu-dropdown {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    body.light-mode .menu-item {
      color: #333;
    }

    body.light-mode .menu-item:hover {
      background: rgba(0,0,0,0.05);
    }

    body.light-mode .menu-divider {
      background: rgba(0,0,0,0.1);
    }

    body.light-mode .menu-button.reorder-active {
      background: rgba(0, 0, 0, 0.12);
    }

    body.light-mode .menu-button.reorder-active:hover {
      background: rgba(0, 0, 0, 0.18);
    }

    body.light-mode .menu-button.reorder-active .menu-dots span {
      background: rgba(0, 0, 0, 0.85);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1>Drives</h1>
        <span class="count" id="count">0</span>
      </div>

      <div class="menu-container">
        <button class="menu-button" id="menu-button" aria-label="Menu">
          <div class="menu-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </button>
        <div class="menu-dropdown" id="menu-dropdown"></div>
      </div>
      <div class="menu-backdrop" id="menu-backdrop"></div>
    </header>

    <div class="list-container" id="list-container"></div>

    <footer class="status" id="status">Ready — ScrollList v2 (slot-based) + DriveItem</footer>
  </div>

  <!-- Load both modules -->
  <script src="scroll-list.js"></script>
  <script src="../drive-item/drive-item.js"></script>
  
  <script>
    // ==================== MENU MANAGER ====================
    class MenuManager {
      constructor(buttonSelector, dropdownSelector, backdropSelector) {
        this.button = document.querySelector(buttonSelector);
        this.dropdown = document.querySelector(dropdownSelector);
        this.backdrop = document.querySelector(backdropSelector);
        this.items = [];
        this.isOpen = false;
        this._bindEvents();
      }

      _bindEvents() {
        this.button.addEventListener('click', (e) => {
          e.stopPropagation();
          this.toggle();
        });
        this.backdrop.addEventListener('click', () => this.close());
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && this.isOpen) this.close();
        });
      }

      addItem(item) {
        this.items.push({ type: 'item', ...item });
        this._render();
        return this;
      }

      addDivider() {
        this.items.push({ type: 'divider' });
        this._render();
        return this;
      }

      updateItem(id, updates) {
        const item = this.items.find(item => item.id === id);
        if (item) {
          Object.assign(item, updates);
          this._render();
        }
        return this;
      }

      _render() {
        this.dropdown.innerHTML = this.items.map(item => {
          if (item.type === 'divider') {
            return '<div class="menu-divider"></div>';
          }
          const isActive = item.isActive ? item.isActive() : false;
          const checkmark = item.toggle && isActive ? '✓ ' : '';
          const iconHtml = item.icon ? `<span class="menu-item-icon">${item.icon}</span>` : '';
          return `
            <button class="menu-item" data-id="${item.id}">
              ${iconHtml}
              <span>${checkmark}${item.label}</span>
            </button>
          `;
        }).join('');

        this.dropdown.querySelectorAll('.menu-item').forEach(el => {
          el.addEventListener('click', () => {
            const item = this.items.find(i => i.id === el.dataset.id);
            if (item && item.action) {
              item.action();
              if (item.toggle) this._render();
            }
            this.close();
          });
        });
      }

      toggle() {
        this.isOpen ? this.close() : this.open();
      }

      open() {
        this.isOpen = true;
        this.dropdown.classList.add('open');
        this.backdrop.classList.add('active');
        this._render();
      }

      close() {
        this.isOpen = false;
        this.dropdown.classList.remove('open');
        this.backdrop.classList.remove('active');
      }
    }

    // ==================== INITIALIZATION ====================
    
    const container = document.getElementById('list-container');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const menuButton = document.getElementById('menu-button');

    // Track DriveItem instances for updates
    const driveItems = new Map();

    // Initialize ScrollList with itemFactory
    const list = new ScrollList(container, {
      emptyMessage: 'No drives yet',
      gap: 8,
      padding: 12,
      keyField: 'id',
      
      // Factory: ScrollList creates slot, we fill it with DriveItem
      itemFactory: (slot, data) => {
        const item = new DriveItem(slot, {
          data: data,
          show: 'compactIcon',
          theme: isDark ? 'dark' : 'light',
          onAction: handleDriveAction
        });
        
        item.on('click', (itemData) => {
          if (list.isReorderMode()) return;
          statusEl.textContent = `Selected: ${itemData.title}`;
        });
        
        driveItems.set(data.id, item);
        return item;
      }
    });

    // Handle DriveItem actions
    function handleDriveAction(action, data) {
      statusEl.textContent = `Action: ${action} on ${data.title}`;
      
      switch (action) {
        case 'remove':
          list.removeItem(data.id);
          driveItems.delete(data.id);
          break;
        case 'pause':
          const pauseItem = driveItems.get(data.id);
          if (pauseItem) pauseItem.update({ status: 'paused' });
          break;
        case 'resume':
          const resumeItem = driveItems.get(data.id);
          if (resumeItem) resumeItem.update({ status: null });
          break;
      }
    }

    // Update count when slots change
    list.on('slot:created', () => {
      countEl.textContent = list.getCount();
    });

    list.on('slot:removed', ({ id }) => {
      driveItems.delete(id);
      countEl.textContent = list.getCount();
    });

    list.on('slot:reordered', ({ id, fromIndex, toIndex }) => {
      statusEl.textContent = `Moved "${id}" from ${fromIndex + 1} to ${toIndex + 1}`;
    });

    list.on('empty', () => {
      countEl.textContent = '0';
    });

    // ==================== MENU SETUP ====================

    const menu = new MenuManager('#menu-button', '#menu-dropdown', '#menu-backdrop');

    function toggleReorderMode() {
      const newMode = !list.isReorderMode();
      list.setReorderMode(newMode);
      menuButton.classList.toggle('reorder-active', newMode);
      statusEl.textContent = newMode ? 'Drag items to reorder' : 'Reorder mode off';
    }

    // Click menu button in reorder mode = exit reorder
    menuButton.addEventListener('click', (e) => {
      if (list.isReorderMode()) {
        e.stopImmediatePropagation();
        toggleReorderMode();
        return;
      }
    }, true);

    menu.addItem({
      id: 'reorder',
      label: 'Reorder',
      toggle: true,
      isActive: () => list.isReorderMode(),
      action: toggleReorderMode
    });

    menu.addDivider();

    let isDark = true;
    menu.addItem({
      id: 'theme',
      label: 'Light Mode',
      toggle: true,
      isActive: () => !isDark,
      action: () => {
        isDark = !isDark;
        document.body.classList.toggle('light-mode', !isDark);
        list.setLightMode(!isDark);
        
        // Update all DriveItems
        for (const item of driveItems.values()) {
          item.setTheme(isDark ? 'dark' : 'light');
        }
        
        menu.updateItem('theme', { 
          label: isDark ? 'Light Mode' : 'Dark Mode'
        });
        statusEl.textContent = isDark ? 'Dark mode' : 'Light mode';
      }
    });

    menu.addDivider();

    // Add sample drives
    let itemCounter = 0;
    menu.addItem({
      id: 'add-download',
      label: 'Add Download',
      action: () => {
        itemCounter++;
        list.addItem({
          id: `drive_dl_${Date.now()}`,
          title: `Download ${itemCounter}.zip`,
          type: 'download',
          size: Math.floor(Math.random() * 100000000) + 1000000,
          fileCount: Math.floor(Math.random() * 20) + 1,
          status: 'inactive',
          progress: null
        });
        statusEl.textContent = `Added download ${itemCounter}`;
      }
    });

    menu.addItem({
      id: 'add-upload',
      label: 'Add Upload',
      action: () => {
        itemCounter++;
        list.addItem({
          id: `drive_ul_${Date.now()}`,
          title: `Upload ${itemCounter}.tar.gz`,
          type: 'upload',
          size: Math.floor(Math.random() * 500000000) + 10000000,
          fileCount: Math.floor(Math.random() * 50) + 1,
          status: 'inactive',
          peers: 0
        });
        statusEl.textContent = `Added upload ${itemCounter}`;
      }
    });

    menu.addDivider();

    // Simulate activity
    let simInterval = null;
    menu.addItem({
      id: 'simulate',
      label: 'Simulate Activity',
      toggle: true,
      isActive: () => simInterval !== null,
      action: () => {
        if (simInterval) {
          clearInterval(simInterval);
          simInterval = null;
          statusEl.textContent = 'Simulation stopped';
        } else {
          simInterval = setInterval(() => {
            for (const [id, item] of driveItems) {
              const data = item.getData();
              
              if (data.type === 'download' && data.status !== 'paused') {
                if (data.progress === null || data.progress >= 1) continue;
                const newProgress = Math.min(1, data.progress + Math.random() * 0.1);
                const speed = Math.floor(Math.random() * 2000000) + 100000;
                item.update({ 
                  progress: newProgress, 
                  speed: newProgress < 1 ? speed : 0,
                  peers: Math.floor(Math.random() * 3) + 1
                });
              } else if (data.type === 'upload' && data.status !== 'paused') {
                const peers = Math.floor(Math.random() * 5);
                const speed = peers > 0 ? Math.floor(Math.random() * 1500000) : 0;
                item.update({ peers, speed });
              }
            }
          }, 500);
          statusEl.textContent = 'Simulation running';
        }
      }
    });

    // Start downloads
    menu.addItem({
      id: 'start-downloads',
      label: 'Start Downloads',
      action: () => {
        for (const [id, item] of driveItems) {
          const data = item.getData();
          if (data.type === 'download' && (data.progress === null || data.progress === undefined)) {
            item.update({ progress: 0, status: 'connecting' });
          }
        }
        statusEl.textContent = 'Downloads started';
      }
    });

    menu.addItem({
      id: 'clear',
      label: 'Clear All',
      action: () => {
        if (simInterval) {
          clearInterval(simInterval);
          simInterval = null;
        }
        list.clear();
        driveItems.clear();
        statusEl.textContent = 'Cleared';
      }
    });

    // ==================== LOAD SAMPLE DATA ====================

    function loadSampleData() {
      const samples = [
        { id: 'drive_001', title: 'Project Files.zip', type: 'download', status: 'inactive', size: 52428800, fileCount: 12 },
        { id: 'drive_002', title: 'Photos 2024', type: 'upload', status: 'inactive', size: 1073741824, fileCount: 347, peers: 0 },
        { id: 'drive_003', title: 'document.pdf', type: 'download', status: 'complete', progress: 1, size: 2457600, fileCount: 1 },
        { id: 'drive_004', title: 'backup-march.tar', type: 'upload', status: 'inactive', size: 5368709120, fileCount: 1, peers: 0 },
        { id: 'drive_005', title: 'Music Collection', type: 'download', status: 'inactive', size: 8589934592, fileCount: 892 },
      ];
      
      samples.forEach(data => list.addItem(data));
      statusEl.textContent = 'Loaded sample data';
    }

    // Load on start
    loadSampleData();

    // ==================== EXPOSE API ====================

    window.list = list;
    window.driveItems = driveItems;
    window.menu = menu;
    
    console.log('=== ScrollList v2 + DriveItem Demo ===');
    console.log('');
    console.log('ScrollList API:');
    console.log('  list.addItem(data)      — Add item via factory');
    console.log('  list.removeItem(id)     — Remove item');
    console.log('  list.updateItem(id, {}) — Update item');
    console.log('  list.setReorderMode(t/f)');
    console.log('  list.clear()');
    console.log('');
    console.log('DriveItems: window.driveItems (Map)');
    console.log('');
    console.log('Architecture: ScrollList creates slots, DriveItem fills them.');
    console.log('Each component owns its own block.');
  </script>
</body>
</html>
