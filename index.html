<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearDrop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            padding-top: 28px; /* Space for drag region + header */
            gap: 12px;
        }

        /* Draggable title bar region */
        .drag-region {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            -webkit-app-region: drag;
            z-index: 100;
        }

        /* Header with profile icon */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            padding-left: 16px;
            z-index: 101;
            pointer-events: none;
        }

        .profile-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(168, 206, 56, 0.3), rgba(61, 181, 121, 0.3));
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            -webkit-app-region: no-drag;
            transition: all 0.2s ease;
        }

        .profile-icon:hover {
            background: linear-gradient(135deg, rgba(168, 206, 56, 0.4), rgba(61, 181, 121, 0.4));
            transform: scale(1.05);
        }

        .profile-icon svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.8);
        }

        /* Glassy style */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Compact Drop Zone */
        .drop-zone {
            flex-shrink: 0;
            height: 100px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(
                135deg,
                rgba(168, 206, 56, 0.05) 0%,
                rgba(61, 181, 121, 0.05) 100%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drop-zone:hover::before,
        .drop-zone.drag-over::before {
            opacity: 1;
        }

        .drop-zone.drag-over {
            border-color: rgba(168, 206, 56, 0.5);
            transform: scale(1.01);
        }

        .drop-zone.has-files {
            border-color: rgba(118, 191, 82, 0.4);
        }

        .drop-zone.has-files::before {
            opacity: 1;
            background: linear-gradient(
                135deg,
                rgba(118, 191, 82, 0.1) 0%,
                rgba(61, 181, 121, 0.1) 100%
            );
        }

        .drop-content {
            text-align: center;
            z-index: 1;
        }

        .drop-icon {
            font-size: 28px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .drop-text {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        .drop-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }

        /* File Preview (compact) */
        .file-preview {
            display: none;
            text-align: center;
            z-index: 1;
        }

        .file-preview.active {
            display: block;
        }

        .file-icon-large {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .file-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Tab Bar */
        .tab-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
            flex-shrink: 0;
        }

        .tabs {
            display: flex;
            gap: 4px;
        }

        .tab {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab:hover {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* List menu button (3 dots) */
        .list-menu-container {
            position: relative;
        }

        .list-menu-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            transition: background 0.15s, color 0.15s;
        }

        .list-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        .list-menu-dots {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .list-menu-dots span {
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
        }

        /* List menu dropdown */
        .list-menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 4px;
            min-width: 180px;
            background: rgba(40, 40, 45, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow: visible; /* Allow submenu to overflow */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.95);
            transform-origin: top right;
            transition: opacity 0.15s, transform 0.15s, visibility 0.15s;
            z-index: 2000;
        }

        .list-menu-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* Elevate entire menu container when dropdown is open */
        .list-menu-container.menu-open {
            z-index: 3000;
        }

        .list-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s;
        }

        .list-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .list-menu-item-icon {
            width: 18px;
            text-align: center;
            opacity: 0.7;
        }

        .list-menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 4px 0;
        }

        /* Sort submenu item with arrow */
        .list-menu-item.has-submenu {
            justify-content: space-between;
        }

        .list-menu-item .submenu-arrow {
            opacity: 0.5;
            font-size: 10px;
        }

        .list-menu-item .sort-indicator {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 4px;
        }

        /* Submenu - needs to escape parent and be above everything */
        .list-submenu {
            position: fixed; /* Fixed to escape any stacking context */
            min-width: 160px;
            background: rgba(40, 40, 45, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95);
            transform-origin: left top;
            transition: opacity 0.15s, transform 0.15s, visibility 0.15s;
            z-index: 4000; /* Above everything */
        }

        .list-submenu.open {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* When flipped to show on left side */
        .list-submenu.flip-left {
            transform-origin: right top;
        }

        .list-submenu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 14px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s;
        }

        .list-submenu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .list-submenu-item.active {
            color: #a8ce38;
        }

        .list-submenu-item .sort-arrow {
            font-size: 11px;
            opacity: 0.8;
        }

        /* Reorder mode - animated menu button */
        @keyframes menu-dot-wiggle-outer {
            0%, 100% { transform: translateX(-0.7px); }
            50% { transform: translateX(0.7px); }
        }

        @keyframes menu-dot-wiggle-middle {
            0%, 100% { transform: translateX(0.7px); }
            50% { transform: translateX(-0.7px); }
        }

        @keyframes menu-brightness-pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1.0; }
        }

        .list-menu-btn.reorder-active {
            background: rgba(168, 206, 56, 0.25);
            color: rgba(255, 255, 255, 0.95);
            animation: menu-brightness-pulse 2s ease-in-out infinite;
        }

        .list-menu-btn.reorder-active:hover {
            background: rgba(168, 206, 56, 0.35);
        }

        .list-menu-btn.reorder-active .list-menu-dots span:nth-child(1) {
            animation: menu-dot-wiggle-outer 0.5s ease-in-out infinite;
        }

        .list-menu-btn.reorder-active .list-menu-dots span:nth-child(2) {
            animation: menu-dot-wiggle-middle 0.5s ease-in-out infinite;
        }

        .list-menu-btn.reorder-active .list-menu-dots span:nth-child(3) {
            animation: menu-dot-wiggle-outer 0.5s ease-in-out infinite;
            animation-delay: -0.08s;
        }

        /* Confirm Dialog */
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .confirm-overlay.active {
            display: flex;
        }

        .confirm-dialog {
            background: rgba(40, 40, 45, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        }

        .confirm-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .confirm-message {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
        }

        .confirm-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .confirm-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        .confirm-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .confirm-btn.primary {
            background: linear-gradient(135deg, #a8ce38 0%, #76bf52 100%);
            color: #0a1a0a;
        }

        .confirm-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 206, 56, 0.3);
        }

        .confirm-btn.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .confirm-btn.danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* ScrollList Container */
        /* 
         * STACKING CONTEXT WARNING: Do NOT add z-index here!
         * Adding z-index creates a new stacking context that traps all child
         * z-indices. Menus inside would be unable to layer above elements
         * outside this container (like backdrops). See ARCHITECTURE.md.
         */
        .list-container {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            min-height: 0;
            position: relative;
            /* No z-index - menus handle their own stacking */
        }

        /* Link Input */
        .link-input-container {
            flex-shrink: 0;
            position: relative;
        }

        .link-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 44px 12px 14px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #fff;
            transition: all 0.2s ease;
        }

        .link-input:focus {
            outline: none;
            border-color: rgba(168, 206, 56, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .link-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .qr-upload-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: background 0.15s ease, color 0.15s ease;
            padding: 0;
        }

        .qr-upload-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }

        .qr-upload-btn:active {
            background: rgba(255, 255, 255, 0.12);
        }

        .qr-upload-btn svg {
            width: 18px;
            height: 18px;
        }

        .link-input.flash {
            animation: inputFlash 0.5s ease;
        }

        @keyframes inputFlash {
            0%, 100% { 
                border-color: rgba(255, 255, 255, 0.1);
                background: rgba(255, 255, 255, 0.06);
            }
            50% { 
                border-color: rgba(168, 206, 56, 0.8);
                background: rgba(168, 206, 56, 0.15);
            }
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .action-btn {
            flex: 1;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .action-btn.share {
            background: linear-gradient(135deg, #a8ce38 0%, #76bf52 100%);
            color: #0a1a0a;
            box-shadow: 
                0 4px 16px rgba(168, 206, 56, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .action-btn.share:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 24px rgba(168, 206, 56, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .action-btn.share:disabled {
            background: linear-gradient(135deg, #4a5a2a 0%, #3a4a2a 100%);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .action-btn.download {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .action-btn.download:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 
                0 6px 24px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(40, 40, 45, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 13px;
            color: #fff;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: rgba(118, 191, 82, 0.3);
        }

        .toast.error {
            border-color: rgba(244, 67, 54, 0.3);
        }

        /* Share Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 320px;
            border-radius: 20px;
            padding: 20px;
            background: rgba(40, 40, 45, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .modal-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
        }

        .link-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 12px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 10px;
            color: #a8ce38;
            word-break: break-all;
            line-height: 1.5;
            margin-bottom: 12px;
            max-height: 80px;
            overflow-y: auto;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #a8ce38 0%, #76bf52 100%);
            color: #0a1a0a;
        }

        .modal-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 206, 56, 0.3);
        }

        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .modal-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hidden {
            display: none !important;
        }

        /* Already downloaded message */
        .already-downloaded-msg {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 8px;
            animation: slideDown 0.3s ease;
        }

        .already-downloaded-msg.fade-out {
            animation: fadeOut 0.5s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Highlight pulse for existing drives */
        .highlight-pulse {
            animation: highlightPulse 2s ease;
        }

        @keyframes highlightPulse {
            0%, 100% { box-shadow: none; }
            25%, 75% { box-shadow: 0 0 0 2px rgba(139, 195, 74, 0.6), 0 0 20px rgba(139, 195, 74, 0.3); }
            50% { box-shadow: 0 0 0 3px rgba(139, 195, 74, 0.8), 0 0 30px rgba(139, 195, 74, 0.4); }
        }
    </style>
</head>
<body>
    <!-- Draggable region for window movement -->
    <div class="drag-region"></div>
    
    <!-- Header with profile icon -->
    <!-- TODO: profile icon hidden for now — design and behavior to be decided later. To re-enable, remove the inline style="display: none" below. -->
    <div class="header">
        <div class="profile-icon" id="profileIcon" title="Profile" style="display: none;">
            <!-- PearDrop Logo SVG (AirDrop-style with pear) -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer waves -->
                <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5 0 1.65-.8 3.1-2.03 4.01L14 13.6V16h-4v-2.4l-.97-.59C7.8 12.1 7 10.65 7 9c0-2.76 2.24-5 5-5z" opacity="0.4"/>
                <!-- Pear shape in center -->
                <path d="M12 6c-1.66 0-3 1.79-3 4 0 1.5.67 2.82 1.7 3.57.26.19.3.56.3.93v1.5c0 .55.45 1 1 1s1-.45 1-1v-1.5c0-.37.04-.74.3-.93C14.33 12.82 15 11.5 15 10c0-2.21-1.34-4-3-4zm-.5 2.5c.28 0 .5.22.5.5s-.22.5-.5.5-.5-.22-.5-.5.22-.5.5-.5z"/>
                <!-- Stem -->
                <path d="M12 4.5c.28 0 .5-.22.5-.5V3c0-.28-.22-.5-.5-.5s-.5.22-.5.5v1c0 .28.22.5.5.5z"/>
                <path d="M13.5 4c.2.2.5.2.7 0l.7-.7c.2-.2.2-.5 0-.7s-.5-.2-.7 0l-.7.7c-.2.2-.2.5 0 .7z"/>
            </svg>
        </div>
    </div>
    
    <div class="app">
        <!-- Compact Drop Zone -->
        <div class="drop-zone glass" id="dropZone">
            <div class="drop-content" id="dropContent">
                <div class="drop-icon">📁</div>
                <div class="drop-text">Drop files or click to browse</div>
                <div class="drop-hint">Share files instantly via P2P</div>
            </div>
            <div class="file-preview" id="filePreview">
                <div class="file-icon-large" id="fileIcon">📄</div>
                <div class="file-info">
                    <div class="file-name" id="fileName">file.txt</div>
                    <div class="file-size" id="fileSize">1.2 MB</div>
                </div>
                <button class="clear-btn" id="clearBtn">Clear</button>
            </div>
        </div>

        <!-- Tab Header -->
        <div class="tab-bar">
            <div class="tabs">
                <label class="tab active" id="tabShares">Share History</label>
                <!-- Future: <button class="tab" id="tabFriends">Friends</button> -->
            </div>
            <div class="list-menu-container">
                <button class="list-menu-btn" id="listMenuBtn" title="List options">
                    <div class="list-menu-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
                <div class="list-menu-dropdown" id="listMenuDropdown">
                    <button class="list-menu-item" data-action="select-shares">
                        <span class="list-menu-item-icon">☑</span>
                        Select Shares
                    </button>
                    <div class="list-menu-divider"></div>
                    <!-- Sort By with submenu -->
                    <div class="list-menu-item has-submenu" id="sortByTrigger">
                        <span style="display: flex; align-items: center; gap: 10px;">
                            <span class="list-menu-item-icon">↕</span>
                            <span>Sort by</span>
                        </span>
                        <span class="submenu-arrow">▶</span>
                    </div>
                    <button class="list-menu-item" data-action="toggle-view" id="toggleViewBtn">
                        <span class="list-menu-item-icon">⊞</span>
                        <span id="toggleViewLabel">Expanded View</span>
                    </button>
                    <div class="list-menu-divider"></div>
                    <button class="list-menu-item" data-action="pause-all">
                        <span class="list-menu-item-icon">⏸</span>
                        Pause All
                    </button>
                    <button class="list-menu-item" data-action="resume-all">
                        <span class="list-menu-item-icon">▶</span>
                        Resume All
                    </button>
                    <div class="list-menu-divider"></div>
                    <button class="list-menu-item" data-action="clear-completed">
                        <span class="list-menu-item-icon">✓</span>
                        Clear Completed
                    </button>
                </div>
            </div>
        </div>

        <!-- ScrollList Container -->
        <div class="list-container glass" id="listContainer">
            <!-- ScrollList renders here -->
        </div>

        <!-- Link Input -->
        <div class="link-input-container">
            <input type="text" class="link-input" id="linkInput"
                   placeholder="Paste peardrop:// link..."
                   autocomplete="off" spellcheck="false">
            <label for="qrFileInput" class="qr-upload-btn" id="qrUploadBtn" title="Read peardrop:// link from a QR image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <path d="M14 14h3v3h-3z"></path>
                    <path d="M20 14v3"></path>
                    <path d="M14 20h3"></path>
                    <path d="M20 20v1"></path>
                </svg>
            </label>
            <input type="file" id="qrFileInput" accept="image/*" hidden>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button class="action-btn share" id="shareBtn" disabled>SHARE</button>
            <button class="action-btn download" id="downloadBtn">DOWNLOAD</button>
        </div>
    </div>

    <!-- Share Link Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-title">Share Link</div>
            <div class="modal-subtitle">Anyone with this link can download</div>
            <canvas id="shareQrCode" width="160" height="160" style="display:none; margin: 12px auto; border-radius: 8px;"></canvas>
            <div class="link-display" id="shareLinkDisplay">Creating link...</div>
            <div class="modal-actions">
                <button class="modal-btn primary" id="copyLinkBtn">Copy</button>
                <button class="modal-btn secondary" id="closeShareBtn">Done</button>
            </div>
        </div>
    </div>

    <!-- Toast for notifications -->
    <div class="toast" id="toast"></div>

    <!-- Sort submenu (outside dropdown to avoid transform containment) -->
    <div class="list-submenu" id="sortSubmenu">
        <button class="list-submenu-item" data-sort="reorder">
            <span>Reorder</span>
        </button>
        <div class="list-menu-divider"></div>
        <button class="list-submenu-item" data-sort="custom">
            <span>Custom</span>
            <span class="sort-arrow"></span>
        </button>
        <button class="list-submenu-item active" data-sort="recent">
            <span>Recent</span>
            <span class="sort-arrow">↓</span>
        </button>
        <button class="list-submenu-item" data-sort="status">
            <span>Status</span>
            <span class="sort-arrow"></span>
        </button>
        <button class="list-submenu-item" data-sort="size">
            <span>Size</span>
            <span class="sort-arrow"></span>
        </button>
        <button class="list-submenu-item" data-sort="name">
            <span>Name</span>
            <span class="sort-arrow"></span>
        </button>
        <button class="list-submenu-item" data-sort="peers">
            <span>Peers</span>
            <span class="sort-arrow"></span>
        </button>
        <button class="list-submenu-item" data-sort="filetype">
            <span>File Type</span>
            <span class="sort-arrow"></span>
        </button>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-title" id="confirmTitle">Confirm</div>
            <div class="confirm-message" id="confirmMessage">Are you sure?</div>
            <div class="confirm-buttons" id="confirmButtons">
                <!-- Buttons inserted dynamically -->
            </div>
        </div>
    </div>

    <!-- Load modules -->
    <script src="lib/scroll-list/scroll-list.js"></script>
    <script src="lib/drive-item/drive-item.js"></script>
    <script src="lib/drive-item/drive-info-panel.js"></script>
    <script src="lib/drive-actions.js"></script>
    <script src="node_modules/jsqr/dist/jsQR.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
