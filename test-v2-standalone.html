<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearDrop v2 - Standalone Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .test-container {
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #a8ce38;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        /* Glass style */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
        }

        /* Test list container */
        .list-container {
            height: 350px;
            overflow: hidden;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .controls button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: rgba(168, 206, 56, 0.2);
            color: #a8ce38;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: rgba(168, 206, 56, 0.3);
        }

        .log {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
            font-family: 'SF Mono', monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .log-entry {
            color: rgba(255,255,255,0.6);
            margin-bottom: 4px;
        }

        .log-entry.event { color: #4a9eff; }
        .log-entry.action { color: #a8ce38; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🍐 PearDrop v2 — Component Test</h1>
        
        <div class="section">
            <div class="section-title">ScrollList + DriveItem Integration</div>
            <div class="list-container glass" id="listContainer"></div>
        </div>

        <div class="section">
            <div class="section-title">Controls</div>
            <div class="controls">
                <button id="addDownload">+ Download</button>
                <button id="addShare">+ Share</button>
                <button id="addComplete">+ Complete</button>
                <button id="simulateProgress">Simulate Progress</button>
                <button id="toggleReorder">Toggle Reorder</button>
                <button id="clearAll">Clear All</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Event Log</div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script src="lib/scroll-list/scroll-list.js"></script>
    <script src="lib/drive-item/drive-item.js"></script>
    <script>
        // Initialize
        const listContainer = document.getElementById('listContainer');
        const logEl = document.getElementById('log');
        let itemCount = 0;
        let driveItems = new Map();
        let activeSimulations = new Map();

        // Create ScrollList with DriveItem factory
        const list = new ScrollList(listContainer, {
            emptyMessage: 'No transfers — add items with buttons above',
            gap: 8,
            padding: 10,
            itemFactory: (slot, data) => {
                const item = new DriveItem(slot, {
                    data: data,
                    show: data.preset || 'compact',
                    theme: 'dark'
                });
                
                item.on('action', (e) => {
                    log(`Action: ${e.action} on "${e.data.title}"`, 'action');
                    handleAction(e.action, e.data);
                });
                
                item.on('click', (d) => log(`Clicked: ${d.title}`, 'event'));
                
                driveItems.set(data.id, item);
                return item;
            }
        });

        // Logging
        function log(msg, type = '') {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Handle DriveItem actions
        function handleAction(action, data) {
            switch(action) {
                case 'pause':
                    const sim = activeSimulations.get(data.id);
                    if (sim) {
                        clearInterval(sim);
                        activeSimulations.delete(data.id);
                    }
                    driveItems.get(data.id)?.update({ status: 'paused' });
                    break;
                case 'resume':
                    driveItems.get(data.id)?.update({ status: 'downloading' });
                    startProgressSimulation(data.id);
                    break;
                case 'remove':
                    activeSimulations.get(data.id) && clearInterval(activeSimulations.get(data.id));
                    activeSimulations.delete(data.id);
                    driveItems.delete(data.id);
                    list.removeItem(data.id);
                    break;
            }
        }

        // Progress simulation
        function startProgressSimulation(id) {
            const item = driveItems.get(id);
            if (!item) return;
            
            let progress = item.getData().progress || 0;
            const interval = setInterval(() => {
                progress += 0.02 + Math.random() * 0.03;
                const speed = 500000 + Math.random() * 1500000;
                
                if (progress >= 1) {
                    clearInterval(interval);
                    activeSimulations.delete(id);
                    item.update({ progress: 1, status: 'complete', speed: 0 });
                    log(`Download complete: ${item.getData().title}`, 'event');
                } else {
                    item.update({ progress, speed });
                }
            }, 200);
            
            activeSimulations.set(id, interval);
        }

        // Button handlers
        document.getElementById('addDownload').addEventListener('click', () => {
            const id = `dl_${++itemCount}`;
            const names = ['Holiday Photos.zip', 'Project Files.tar.gz', 'Music Collection.zip', 'Video Export.mp4', 'Documents.zip'];
            const name = names[Math.floor(Math.random() * names.length)];
            const size = Math.floor(50 + Math.random() * 500) * 1024 * 1024;
            
            list.addItem({
                id,
                title: name,
                size,
                progress: 0,
                status: 'downloading',
                speed: 800000,
                peers: 1,
                preset: 'downloadCompact'
            });
            
            log(`Added download: ${name}`, 'event');
            startProgressSimulation(id);
        });

        document.getElementById('addShare').addEventListener('click', () => {
            const id = `share_${++itemCount}`;
            const names = ['Important Docs', 'Photo Album', 'Project Backup', 'Code Archive'];
            const name = names[Math.floor(Math.random() * names.length)];
            const size = Math.floor(10 + Math.random() * 200) * 1024 * 1024;
            
            list.addItem({
                id,
                title: name,
                size,
                fileCount: Math.floor(1 + Math.random() * 20),
                status: 'sharing',
                peers: Math.floor(Math.random() * 3),
                preset: 'shareCompact'
            });
            
            log(`Added share: ${name}`, 'event');
        });

        document.getElementById('addComplete').addEventListener('click', () => {
            const id = `complete_${++itemCount}`;
            const name = `Completed File ${itemCount}.zip`;
            
            list.addItem({
                id,
                title: name,
                size: Math.floor(50 + Math.random() * 300) * 1024 * 1024,
                status: 'complete',
                progress: 1,
                preset: 'compact'
            });
            
            log(`Added completed: ${name}`, 'event');
        });

        document.getElementById('simulateProgress').addEventListener('click', () => {
            // Find first downloading item and boost its progress
            for (const [id, item] of driveItems) {
                const data = item.getData();
                if (data.status === 'downloading' && data.progress < 1) {
                    item.update({ progress: Math.min(1, data.progress + 0.2) });
                    log(`Boosted progress for: ${data.title}`, 'action');
                    break;
                }
            }
        });

        document.getElementById('toggleReorder').addEventListener('click', () => {
            const isReorder = list._reorderMode;
            list.setReorderMode(!isReorder);
            log(`Reorder mode: ${!isReorder ? 'ON' : 'OFF'}`, 'action');
        });

        document.getElementById('clearAll').addEventListener('click', () => {
            // Stop all simulations
            for (const interval of activeSimulations.values()) {
                clearInterval(interval);
            }
            activeSimulations.clear();
            driveItems.clear();
            list.clear();
            log('Cleared all items', 'action');
        });

        // Initial log
        log('Test harness initialized');
        log('Use buttons above to add items');
    </script>
</body>
</html>
