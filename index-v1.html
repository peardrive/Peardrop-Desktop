<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearDrop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            padding-top: 40px; /* Space for drag region */
            gap: 16px;
        }

        /* Draggable title bar region */
        .drag-region {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            -webkit-app-region: drag;
            z-index: 100;
        }

        /* Glassy style mixin */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Tab Navigation */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .tab-btn.active {
            background: rgba(168, 206, 56, 0.2);
            color: #a8ce38;
        }

        .tab-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-page {
            display: none;
            flex: 1;
            flex-direction: column;
            gap: 16px;
        }

        .tab-page.active {
            display: flex;
        }

        /* Downloads Tab */
        .shares-list {
            flex: 1;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 20px;
        }

        .shares-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .empty-hint {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Download History Item */
        .download-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .download-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .download-item-name {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 8px;
        }

        /* Download item meta row */
        .download-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .download-item-status.seeding {
            color: #4caf50;
        }

        .download-item-status.downloading {
            color: #2196f3;
        }

        .download-item-status.uploading {
            color: #a8ce38;
        }

        .download-item-status.local {
            color: rgba(255, 255, 255, 0.6);
        }

        .download-item-status.missing {
            color: #f44336;
        }

        .download-item-peers {
            color: rgba(168, 206, 56, 0.8);
        }

        /* 3-dot menu */
        .download-item-menu-wrapper {
            position: relative;
        }

        .download-item-menu-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .download-item-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        .download-item-dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            background: rgba(40, 40, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px 0;
            min-width: 120px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .download-item-dropdown.hidden {
            display: none;
        }

        .dropdown-item {
            display: block;
            width: 100%;
            padding: 8px 14px;
            border: none;
            background: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .dropdown-item.danger {
            color: #f44336;
        }

        .dropdown-item.danger:hover {
            background: rgba(244, 67, 54, 0.15);
        }

        /* Main Drop Zone */
        .drop-zone {
            flex: 1;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(
                135deg,
                rgba(168, 206, 56, 0.05) 0%,
                rgba(61, 181, 121, 0.05) 100%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drop-zone:hover::before,
        .drop-zone.drag-over::before {
            opacity: 1;
        }

        .drop-zone.drag-over {
            border-color: rgba(168, 206, 56, 0.5);
            transform: scale(1.01);
        }

        .drop-zone.has-files {
            border-color: rgba(118, 191, 82, 0.4);
        }

        .drop-zone.has-files::before {
            opacity: 1;
            background: linear-gradient(
                135deg,
                rgba(118, 191, 82, 0.1) 0%,
                rgba(61, 181, 121, 0.1) 100%
            );
        }

        .drop-content {
            text-align: center;
            z-index: 1;
        }

        .drop-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.9;
        }

        .drop-text {
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        .drop-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
        }

        /* File Preview */
        .file-preview {
            display: none;
            text-align: center;
            z-index: 1;
        }

        .file-preview.active {
            display: block;
        }

        .file-icon-large {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .file-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .action-btn.share {
            background: linear-gradient(135deg, #a8ce38 0%, #76bf52 100%);
            color: #0a1a0a;
            box-shadow: 
                0 4px 16px rgba(168, 206, 56, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .action-btn.share:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 24px rgba(168, 206, 56, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .action-btn.share:disabled {
            background: linear-gradient(135deg, #4a5a2a 0%, #3a4a2a 100%);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .action-btn.download {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .action-btn.download:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 
                0 6px 24px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            padding: 24px;
            background: rgba(40, 40, 45, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .modal-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .link-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 11px;
            color: #a8ce38;
            word-break: break-all;
            line-height: 1.5;
            margin-bottom: 16px;
            max-height: 120px;
            overflow-y: auto;
        }

        .link-display.loading {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .link-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #fff;
            margin-bottom: 16px;
            transition: border-color 0.2s ease;
        }

        .link-input:focus {
            outline: none;
            border-color: rgba(168, 206, 56, 0.5);
        }

        .link-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #a8ce38 0%, #76bf52 100%);
            color: #0a1a0a;
        }

        .modal-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 206, 56, 0.3);
        }

        .modal-btn.primary:disabled {
            background: #3a3a3a;
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        .modal-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Status messages */
        .status {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .status.success {
            background: rgba(118, 191, 82, 0.15);
            color: #76bf52;
        }

        .status.error {
            background: rgba(255, 100, 100, 0.15);
            color: #ff6b6b;
        }

        .status.loading {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Enable rubber-band scrolling on all scrollable areas */
        .shares-list,
        .transfers {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: auto;
        }

        .hidden {
            display: none !important;
        }

        /* Transfer Progress */
        .transfers {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .transfer-item {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .transfer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .transfer-peer {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .peer-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #76bf52;
            box-shadow: 0 0 8px rgba(118, 191, 82, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .peer-indicator.downloading {
            background: #3db579;
            box-shadow: 0 0 8px rgba(61, 181, 121, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .peer-name {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .transfer-speed {
            font-size: 11px;
            color: rgba(168, 206, 56, 0.9);
            font-weight: 500;
        }

        /* Unified Progress Bar - ONE style for all transfers */
        .transfer-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #76bf52 0%, #a8ce38 100%);
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(168, 206, 56, 0.4);
        }

        .progress-bar.indeterminate {
            width: 100% !important;
            background: linear-gradient(
                90deg, 
                transparent 0%, 
                #76bf52 20%, 
                #a8ce38 50%, 
                #76bf52 80%, 
                transparent 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .progress-text {
            position: absolute;
            right: 0;
            top: -16px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Unified Transfer Stats - ONE style for all transfers */
        .transfer-stats,
        .transfer-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }

        .transfer-stats .transfer-bytes,
        .transfer-footer .transfer-bytes {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .transfer-stats .transfer-percent,
        .transfer-footer .transfer-percent {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        /* Legacy support - ensure old names work too */
        .transfer-bytes {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .transfer-percent {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .transfer-status.error {
            color: #f44336;
        }

        /* Pending transfer state */
        .transfer-item.pending {
            border-color: rgba(255, 193, 7, 0.2);
        }

        .peer-indicator.pending,
        .peer-indicator.connecting {
            background: #ffc107;
            box-shadow: 0 0 8px rgba(255, 193, 7, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .peer-indicator.error {
            background: #f44336;
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.5);
        }

        .peer-indicator.complete {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .transfer-actions {
            display: flex;
            gap: 6px;
        }

        .copy-link-btn,
        .stop-pending-btn,
        .cancel-download-btn,
        .minimize-download-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .minimize-download-btn {
            font-size: 14px;
            font-weight: bold;
        }

        .minimize-download-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }

        .cancel-download-btn:hover {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .copy-link-btn:hover {
            background: rgba(168, 206, 56, 0.2);
            color: #a8ce38;
        }

        .stop-pending-btn:hover {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6b6b;
        }

        .transfer-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .transfer-file {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .transfer-size {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .transfer-status {
            font-size: 12px;
            color: rgba(255, 193, 7, 0.9);
            font-style: italic;
        }

        .transfer-link {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            font-size: 10px;
            color: rgba(168, 206, 56, 0.7);
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .transfer-link:hover {
            background: rgba(0, 0, 0, 0.3);
            color: #a8ce38;
        }

        .transfer-item.complete {
            border-color: rgba(118, 191, 82, 0.3);
        }

        .transfer-item.complete .peer-indicator {
            background: #76bf52;
            animation: none;
        }

        /* "Moved to Shares" notification */
        .transfer-item.moved {
            background: rgba(118, 191, 82, 0.1);
            border-color: rgba(118, 191, 82, 0.3);
            cursor: pointer;
            padding: 10px 14px;
            animation: fadeSlideIn 0.3s ease;
        }

        .transfer-item.moved:hover {
            background: rgba(118, 191, 82, 0.15);
        }

        .moved-notification {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .moved-text {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .moved-link {
            font-size: 11px;
            color: #a8ce38;
            font-weight: 500;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Minimal share status bar */
        .share-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(118, 191, 82, 0.1);
            border: 1px solid rgba(118, 191, 82, 0.2);
            border-radius: 10px;
            padding: 8px 12px;
            animation: slideIn 0.3s ease;
        }

        .share-status-info {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .share-status-name {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .share-status-peers {
            font-size: 11px;
            color: rgba(168, 206, 56, 0.8);
            white-space: nowrap;
        }

        .share-status-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .share-status-actions button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .share-status-actions button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
        }

        .share-status-actions .copy-link-btn {
            background: rgba(168, 206, 56, 0.2);
            color: #a8ce38;
        }

        .share-status-actions .copy-link-btn:hover {
            background: rgba(168, 206, 56, 0.3);
        }

        .share-status-actions .stop-pending-btn {
            padding: 4px 8px;
            color: rgba(255, 255, 255, 0.4);
        }

        .share-status-actions .stop-pending-btn:hover {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        /* Download progress in modal */
        .download-progress {
            margin-bottom: 16px;
        }

        .download-progress .transfer-progress {
            height: 6px;
            margin-bottom: 8px;
        }

        .download-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ============================================
         * HOME BLOCKS - Modular Layout System
         * ============================================ */
        
        /* Notification Slot - Single notification area */
        #notificationSlot {
            transition: opacity 0.3s ease, max-height 0.3s ease;
            overflow: hidden;
            max-height: 200px;
        }
        
        #notificationSlot.hidden {
            opacity: 0;
            max-height: 0;
            margin: 0;
            padding: 0;
        }
        
        #notificationSlot.fading-out {
            opacity: 0;
            max-height: 200px; /* Keep height during fade */
        }
        
        /* Smooth layout transitions when notification appears/disappears */
        #dropZone {
            transition: margin-bottom 0.3s ease;
        }
        
        #dropZone.has-notification {
            margin-bottom: 12px;
        }

        /* ============================================
         * TRANSFER BLOB - Universal Transfer Component
         * ============================================ */
        .transfer-blob {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 14px;
            animation: slideIn 0.3s ease;
            margin-bottom: 8px;
        }

        .transfer-blob:last-child {
            margin-bottom: 0;
        }

        .blob-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .blob-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #76bf52;
            box-shadow: 0 0 8px rgba(118, 191, 82, 0.5);
            margin-right: 8px;
            flex-shrink: 0;
        }

        .blob-indicator.waiting {
            background: #a8ce38;
            animation: blink 1.5s ease-in-out infinite;
        }

        .blob-indicator.connecting {
            background: #f5a623;
            animation: blink 1s ease-in-out infinite;
        }

        .blob-indicator.active {
            background: #3db579;
            box-shadow: 0 0 8px rgba(61, 181, 121, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .blob-indicator.complete {
            background: #76bf52;
            box-shadow: 0 0 8px rgba(118, 191, 82, 0.6);
            animation: none;
        }

        .blob-indicator.error {
            background: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.5);
            animation: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .blob-name {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
        }

        .blob-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .blob-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .blob-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.95);
        }

        .blob-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .blob-bar {
            height: 100%;
            background: linear-gradient(90deg, #76bf52 0%, #a8ce38 100%);
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(168, 206, 56, 0.4);
        }

        .blob-bar.pulsing {
            background: linear-gradient(
                90deg, 
                rgba(168, 206, 56, 0.2) 0%, 
                rgba(168, 206, 56, 0.5) 50%, 
                rgba(168, 206, 56, 0.2) 100%
            );
            animation: barPulse 1.5s ease-in-out infinite;
        }

        @keyframes barPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .blob-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .blob-status {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .blob-waiting .blob-status {
            animation: blink 1.5s ease-in-out infinite;
        }

        .blob-connecting .blob-status {
            animation: blink 1s ease-in-out infinite;
        }

        .blob-info {
            font-size: 11px;
            font-weight: 500;
            color: rgba(168, 206, 56, 0.9);
        }

        .blob-complete .blob-info {
            color: #76bf52;
        }

        .blob-error .blob-status {
            color: #e74c3c;
        }

        .blob-moved {
            cursor: pointer;
            background: rgba(118, 191, 82, 0.1);
            border-color: rgba(118, 191, 82, 0.2);
        }

        .blob-moved:hover {
            background: rgba(118, 191, 82, 0.15);
        }

        .blob-moved .blob-progress {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Draggable region for window movement -->
    <div class="drag-region"></div>
    
    <div class="app">
        <!-- Tab Navigation -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="home">Home</button>
            <button class="tab-btn" data-tab="shares">Shares</button>
        </div>

        <!-- Tab Content Container -->
        <div class="tab-content">
            <!-- Home Tab -->
            <div class="tab-page active" id="homeTab">
                <!-- Main Drop Zone -->
                <div class="drop-zone glass" id="dropZone">
                    <!-- Default state -->
                    <div class="drop-content" id="dropContent">
                        <div class="drop-icon">📁</div>
                        <div class="drop-text">Drop files here</div>
                        <div class="drop-hint">or click to browse</div>
                    </div>
                    
                    <!-- File preview state -->
                    <div class="file-preview" id="filePreview">
                        <div class="file-icon-large" id="fileIcon">📄</div>
                        <div class="file-name" id="fileName">file.txt</div>
                        <div class="file-size" id="fileSize">1.2 MB</div>
                        <button class="clear-btn" id="clearBtn">Clear</button>
                    </div>
                </div>

                <!-- Notification Slot - Single notification area (managed by home-blocks.js) -->
                <div id="notificationSlot" class="hidden">
                    <!-- Notification content rendered by HomeBlocks -->
                </div>
                
                <!-- Legacy transfers container (for backwards compatibility during transition) -->
                <div class="transfers hidden" id="transfers">
                    <!-- Transfer items will be inserted here -->
                </div>

                <!-- Action Buttons -->
                <div class="actions">
                    <button class="action-btn share" id="shareBtn" disabled>SHARE</button>
                    <button class="action-btn download" id="downloadBtn">DOWNLOAD</button>
                </div>
            </div>

            <!-- Downloads Tab -->
            <div class="tab-page" id="sharesTab">
                <div class="shares-list" id="sharesList">
                    <!-- Empty state -->
                    <div class="shares-empty" id="sharesEmpty">
                        <div class="empty-icon">📤</div>
                        <div class="empty-text">No active shares</div>
                        <div class="empty-hint">Shared and received files will appear here</div>
                    </div>
                    <!-- Download items will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-title">Share Link</div>
            <div class="modal-subtitle">Anyone with this link can download your files</div>
            
            <div class="link-display" id="shareLinkDisplay">
                Creating link...
            </div>
            
            <div class="modal-actions">
                <button class="modal-btn primary" id="copyLinkBtn">Copy Link</button>
                <button class="modal-btn secondary" id="closeShareBtn">Done</button>
            </div>
        </div>
    </div>

    <!-- Download Modal -->
    <div class="modal-overlay" id="downloadModal">
        <div class="modal">
            <div class="modal-title">Download Files</div>
            <div class="modal-subtitle">Paste a PearDrop link to download</div>
            
            <input type="text" class="link-input" id="downloadLinkInput" 
                   placeholder="peardrop://..." autocomplete="off" spellcheck="false">
            
            <div id="downloadStatus"></div>
            
            <div class="modal-actions">
                <button class="modal-btn primary" id="startDownloadBtn">Download</button>
                <button class="modal-btn secondary" id="closeDownloadBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="lib/transfer-blob.js"></script>
    <script src="lib/home-blocks.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
